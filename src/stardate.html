<html>
	<head>
		<title>Current STARDATE</title>
	</head>

	<body>
		<applet code="StardateApplet.class" archive="stardateapplet.jar,stardate.jar" width="600" height="20">
			<param name="SHOW_ISSUE" value="true">
			<param name="PAD_INTEGER" value="true">
			<param name="FRACTIONAL_DIGITS" value="3">
			<param name="UPDATE_PERIOD_MILLIS" value="1000">
			<param name="BACKGROUND_RED" value="255">
			<param name="BACKGROUND_GREEN" value="255">
			<param name="BACKGROUND_BLUE" value="255">
			<param name="FOREGROUND_RED" value="255">
			<param name="FOREGROUND_GREEN" value="255">
			<param name="FOREGROUND_BLUE" value="255">
			<param name="PEN_RED" value="0">
			<param name="PEN_GREEN" value="0">
			<param name="PEN_BLUE" value="0">
			<param name="FONT_NAME" value="Verdana">
			<param name="FONT_STYLE" value="bolditalic">
			<param name="FONT_SIZE" value="12">
			<param name="TEXT_BEFORE" value="Captain's Log, STARDATE&nbsp;">
			<param name="TEXT_AFTER" value=":&nbsp;Starship Enterprise on training mission...">
		</applet>
	</body>
</html>
